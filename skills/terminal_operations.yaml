name: terminal_operations
description: 在终端执行 shell 命令。可以运行脚本、编译、安装依赖等
keywords:
- 终端
- shell
- 执行
- 运行
- 脚本
- 编译
- 安装
- pip
- git
- 命令
- 部署
steps:
- 明确要运行的命令，考虑工作目录（默认项目根目录）
- 对长任务设置合理的 timeout（默认 30 秒）
- 检查命令输出，判断是否成功
- 失败时分析错误信息，决定是否重试或换方案
examples:
- 任务：查看项目目录结构
- 1. terminal('ls -la', timeout=5)
- 2. 阅读输出确认
- ''
- 任务：安装依赖
- 1. terminal('pip install -r requirements.txt', timeout=60)
- 2. 检查 exit_code
- ''
pitfalls:
- 不要用 shell 来读取文件内容（用 read_file 工具）
- 不要用 grep/rg 搜索文件（用 search_files 工具）
- 不要用 cat/echo heredoc 创建文件（用 write_file 工具）
- 不要用 sed 进行精确替换（用 patch 工具）
- 绝对不要在终端中编辑 core/ 目录下的文件
- 命令输出超过 3000 字符会被截断
usage_count: 271
