name: 创意小说构思与大纲生成
description: 协助用户构建小说世界观、角色设定及情节框架
task_type: coding
keywords:
- coding
- 构思故事
- 撰写章节
- 润色编辑
- 提供建议
steps:
- 确认用户想要的小说类型与篇幅范围
- 引导用户明确核心创意或特定设定需求
- 构建包含前世今生或核心冲突的故事框架
- 设计主角背景、能力及多世身份的具体设定
- 规划章节大纲并补充关键情节转折点
- 输出完整的角色卡、世界观及分章剧情概要
- 邀请用户确认细节或提出修改意见
pitfalls:
- 避免在用户未提供具体需求时直接输出完整长篇
- 注意回复超时风险，复杂任务需分步交互
