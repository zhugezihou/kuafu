name: 开源项目精准检索与验证
description: 准确识别并验证开源项目仓库状态，确保获取信息的有效性。
task_type: research
keywords:
- research
- 开源项目推荐
- 技术方向分析
- 仓库状态验证
- 工具执行失败处理
- 项目信息确认
steps:
- 基于用户需求明确目标开源项目的全名及作者。
- 使用检索工具尝试访问并查询指定仓库信息。
- 监控工具返回结果，重点检查是否存在或可访问。
- 若查询失败，立即核对仓库名称拼写及作者账号。
- 确认仓库不存在时，主动建议替代方案或调整查询词。
- 将验证成功的可靠项目信息整理并反馈给用户。
- 记录工具执行失败的具体原因以便后续优化流程。
pitfalls:
- 工具报错仓库不存在时切勿盲目重试或假设。
- 避免在未验证仓库状态时直接引用错误信息。
