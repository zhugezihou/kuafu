name: opensource-tech-research
description: 基于搜索结果总结对特定目标有借鉴价值的开源项目和技术方向
task_type: research
keywords:
- research
- 开源项目推荐
- 技术方向总结
- 可借鉴点分析
- 类似项目调研
- 技术选型建议
steps:
- 梳理用户核心需求或目标应用场景
- 检索高星且活跃的同类开源项目
- 分析项目的核心架构与设计亮点
- 提取角色分配与协作流程机制
- 从系统化视角总结可借鉴的工作流
- 整合关键技术与实现路径
- 输出结构化总结报告
pitfalls:
- 避免只罗列项目名而忽略具体借鉴点
- 需区分项目核心功能与可复用模块
- 关注项目活跃度与社区维护情况
