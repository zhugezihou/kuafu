name: Python 异步编程入门指南
description: 基于官方文档和最佳实践，教授 Python 异步编程的关键要点和常用模式
task_type: research
keywords:
- research
- 异步编程
- asyncio
- 协程
- async/await
- 事件循环
steps:
- 使用 asyncio.run() 作为程序入口启动异步主函数
- 定义 async def 函数创建协程，用 await 调用其他协程
- 使用 asyncio.gather() 并行运行多个协程任务
- 使用 asyncio.create_task() 创建后台任务并跟踪状态
- 使用 async with 管理异步上下文，如 aiohttp 会话
- 使用 async for 遍历异步迭代器，如异步流
- 使用 asyncio.sleep() 实现非阻塞延时，避免阻塞事件循环
pitfalls:
- 不要直接操作事件循环，如 loop.run_until_complete()，应使用 asyncio.run()
- 不要在协程中使用同步阻塞操作，如 time.sleep()，会导致事件循环阻塞
- 避免在 asyncio.run() 之外创建事件循环，可能导致资源泄漏
