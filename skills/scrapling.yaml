# Scrapling 技能配置文件
# Scrapling 是一个自适应 Web Scraping 框架
# GitHub: https://github.com/D4Vinci/Scrapling
# 文档: https://scrapling.readthedocs.io

name: scrapling
description: |
  Scrapling 是一个自适应 Web 抓取框架，能够自动适应网站结构变化，
  无需手动维护选择器。支持从单个请求到大规模爬取的所有场景。

  核心特性:
  - 自适应解析：自动学习网站结构变化
  - 反反爬机制：内置多种反爬策略
  - 高性能：优化的并发抓取能力
  - 易维护：选择器自动生成，无需手动维护
  - 多语言支持：提供 Python 库

安装命令:
  pip install scrapling

主要类:
  - ScraplingEngine: 主引擎，用于创建 Scrapling 实例
  - Selector: 选择器对象，用于提取数据
  - SelectorGroup: 选择器组，用于批量提取

常用方法:
  - engine.scrape(): 抓取单个页面
  - engine.scrape_async(): 异步抓取多个页面
  - engine.scrape_all(): 批量抓取多个 URL
  - engine.scrape_urls(): 批量抓取 URL 列表
  - engine.parse_html(): 解析 HTML 字符串
  - engine.parse_urls(): 解析 URL 列表

选择器类型:
  - css: CSS 选择器
  - xpath: XPath 选择器
  - regex: 正则表达式
  - class: CSS class
  - id: CSS id
  - tag: HTML 标签
  - data: 数据属性选择器

注意事项:
  - 需要安装 scrapling 库才能使用
  - 部分功能可能需要额外依赖（如 requests, beautifulsoup4 等）
  - 爬取大量数据时注意遵守目标网站的 robots.txt 协议
  - 建议设置合理的请求延迟，避免对目标服务器造成压力

示例用法:
  from scrapling import ScraplingEngine
  
  # 创建引擎实例
  engine = ScraplingEngine()
  
  # 抓取单个页面
  data = engine.scrape("https://example.com")
  
  # 异步抓取多个页面
  urls = ["https://example.com/page1", "https://example.com/page2"]
  results = engine.scrape_async(urls)
