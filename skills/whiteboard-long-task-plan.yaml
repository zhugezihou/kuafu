name: whiteboard-long-task-plan
description: 从generic类任务中自动提取的技能
task_type: generic
keywords:
- generic
steps:
- 白板模式
- 复杂任务
- 长上下文
- 中间结果
- 信息存储
- 评估任务复杂度，判断是否超过单次对话处理上限。
- 激活白板模式，将任务背景与核心目标写入外部分区。
- 分阶段拆解任务，逐步将执行状态和中间产出写入白板。
- 在上下文窗口满时，优先引用白板内容而非重复历史。
- 完成各阶段后汇总白板数据，生成最终综合报告。
