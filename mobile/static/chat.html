<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<title>夸父 · PC 助手</title>
<style>
/* ── 全局 ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #232340;
  --border: #2d2d50;
  --text: #e0e0f0;
  --text2: #8888aa;
  --primary: #6c63ff;
  --primary-hover: #5a52e0;
  --success: #4ade80;
  --warning: #fbbf24;
  --error: #f87171;
  --info: #60a5fa;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ── 布局（左聊天 + 右侧面板） ── */
.app {
  display: grid;
  grid-template-columns: 1fr 320px;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
  gap: 0;
}

.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}

.header-left { display: flex; align-items: center; gap: 10px; }
.header .logo {
  width: 28px; height: 28px;
  background: var(--primary);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: bold; color: white;
}
.header h1 { font-size: 16px; font-weight: 600; }
.model-badge {
  font-size: 11px; background: var(--surface2); color: var(--text2);
  padding: 2px 8px; border-radius: 10px; white-space: nowrap;
}
.header-actions { display: flex; gap: 8px; }
.icon-btn {
  background: transparent; border: 1px solid var(--border);
  color: var(--text2); width: 34px; height: 34px;
  border-radius: 8px; cursor: pointer; font-size: 16px;
  transition: all 0.2s;
}
.icon-btn:hover { background: var(--surface2); }

/* ── 聊天区 ── */
.chat-area {
  overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 14px;
  scroll-behavior: smooth;
}
.chat-area::-webkit-scrollbar { width: 5px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.welcome { text-align: center; margin: auto; padding: 40px 20px; color: var(--text2); }
.welcome .icon { font-size: 48px; margin-bottom: 12px; }
.welcome h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
.welcome p { font-size: 14px; line-height: 1.6; max-width: 360px; margin: 0 auto; }

.message { display: flex; gap: 10px; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.message.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}
.message.user .msg-avatar { background: var(--primary); color: white; }
.message.assistant .msg-avatar { background: var(--surface2); color: var(--primary); border: 1px solid var(--border); }

.msg-content {
  max-width: 78%; padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 14px; line-height: 1.6;
  word-break: break-word; white-space: pre-wrap;
}
.message.user .msg-content { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
.message.assistant .msg-content { background: var(--assistant-bg, #1e1e38); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

.msg-content p { margin: 4px 0; }
.msg-content code { background: rgba(0,0,0,0.3); padding: 1px 5px; border-radius: 4px; font-size: 13px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; }
.msg-content pre { background: rgba(0,0,0,0.4); padding: 10px; border-radius: var(--radius-sm); overflow-x: auto; font-size: 13px; margin: 8px 0; }
.msg-content pre code { background: none; padding: 0; }
.msg-content strong { color: var(--primary); }

.msg-time { font-size: 10px; color: var(--text2); margin-top: 4px; text-align: right; opacity: 0.5; }
.message.error .msg-content { background: rgba(248, 113, 113, 0.1); border-color: var(--error); color: var(--error); }

/* ── 输入区 ── */
.input-area {
  padding: 12px 20px; background: var(--surface);
  border-top: 1px solid var(--border);
}
.input-wrapper { display: flex; gap: 8px; align-items: center; }
textarea {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); padding: 10px 14px;
  font-size: 14px; font-family: inherit; resize: none;
  min-height: 40px; max-height: 100px; outline: none;
  transition: border-color 0.2s;
}
textarea:focus { border-color: var(--primary); }
textarea::placeholder { color: var(--text2); }
.send-btn {
  width: 40px; height: 40px; border-radius: var(--radius); border: none;
  background: var(--primary); color: white; font-size: 18px;
  cursor: pointer; flex-shrink: 0; transition: all 0.2s;
}
.send-btn:hover { background: var(--primary-hover); }
.send-btn.loading { opacity: 0.5; pointer-events: none; }

/* ── 右侧面板 ── */
.side-panel {
  grid-column: 2; grid-row: 2 / 4;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto;
  padding: 12px;
  gap: 12px;
}

.panel-title {
  font-size: 12px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
}

/* ── 实时任务计时器 ── */
.current-task {
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 10px; display: flex; flex-direction: column; gap: 6px;
}
.task-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; padding: 4px 0;
}
.task-icon { flex-shrink: 0; }
.task-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-timer {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 12px; color: var(--warning); min-width: 50px; text-align: right;
}
.task-item.done .task-timer { color: var(--success); }
.task-item.error .task-timer { color: var(--error); }

/* ── 时间线 ── */
.timeline { display: flex; flex-direction: column; gap: 4px; }
.tl-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; padding: 3px 0; color: var(--text2);
}
.tl-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.tl-dot.llm { background: var(--info); }
.tl-dot.tool { background: var(--warning); }
.tl-dot.finish { background: var(--success); }
.tl-dot.error { background: var(--error); }
.tl-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tl-time { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; color: var(--text2); }

/* ── 审批面板 ── */
.approval-panel {
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 10px; display: flex; flex-direction: column; gap: 8px;
}
.approval-card {
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 10px; background: var(--surface);
}
.approval-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.approval-tool { font-size: 13px; font-weight: 600; }
.approval-risk {
  font-size: 10px; padding: 2px 6px; border-radius: 4px;
  background: rgba(251, 191, 36, 0.2); color: var(--warning);
}
.approval-risk.high { background: rgba(248, 113, 113, 0.2); color: var(--error); }
.approval-risk.low { background: rgba(74, 222, 128, 0.2); color: var(--success); }
.approval-detail { font-size: 11px; color: var(--text2); margin-bottom: 8px; white-space: pre-wrap; max-height: 80px; overflow-y: auto; }
.approval-actions { display: flex; gap: 6px; }
.btn-approve, .btn-reject {
  flex: 1; border: none; border-radius: var(--radius-sm);
  padding: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s;
}
.btn-approve { background: var(--success); color: #000; }
.btn-approve:hover { opacity: 0.8; }
.btn-reject { background: var(--error); color: white; }
.btn-reject:hover { opacity: 0.8; }

/* ── 状态条 ── */
.status-bar {
  grid-column: 1; grid-row: 3;
  display: flex; align-items: center; gap: 8px;
  padding: 6px 20px; font-size: 11px; color: var(--text2);
  background: var(--surface); border-top: 1px solid var(--border);
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
.status-dot.loading { background: var(--warning); animation: pulse 0.6s infinite; }
.status-dot.error { background: var(--error); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ── Thinking 动画 ── */
.thinking-indicator { display: flex; gap: 4px; padding: 4px 0; }
.thinking-indicator span { width: 6px; height: 6px; border-radius: 50%; background: var(--text2); animation: bounce 1.4s infinite; }
.thinking-indicator span:nth-child(2) { animation-delay: 0.2s; }
.thinking-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

/* ── 空状态 ── */
.panel-empty { font-size: 12px; color: var(--text2); text-align: center; padding: 16px; }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- 顶栏 -->
  <div class="header">
    <div class="header-left">
      <div class="logo">夸</div>
      <h1>夸父</h1>
      <span class="model-badge" id="modelBadge">载入中…</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="resetChat()" title="新对话">✕</button>
      <button class="icon-btn" onclick="toggleModel()" title="切换模型">⟳</button>
    </div>
  </div>

  <!-- 聊天区 -->
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="icon">🌞</div>
      <h2>夸父 · 逐日不息</h2>
      <p>我是夸父，一个自我进化的 AI 助手。右侧面板实时显示任务进度和审批请求。</p>
    </div>
  </div>

  <!-- 右侧面板 -->
  <div class="side-panel" id="sidePanel">
    <!-- 实时任务 -->
    <div>
      <div class="panel-title">⏱ 当前任务</div>
      <div class="current-task" id="currentTask">
        <div class="panel-empty" id="taskEmpty">等待任务…</div>
        <div id="taskList"></div>
      </div>
    </div>
    <!-- 审批面板 -->
    <div>
      <div class="panel-title">🔐 审批</div>
      <div class="approval-panel" id="approvalPanel">
        <div class="panel-empty" id="approvalEmpty">无待审批</div>
        <div id="approvalList"></div>
      </div>
    </div>
    <!-- 时间线 -->
    <div style="flex:1">
      <div class="panel-title">📋 时间线</div>
      <div class="timeline" id="timeline">
        <div class="panel-empty" id="timelineEmpty">暂无记录</div>
        <div id="timelineList"></div>
      </div>
    </div>
  </div>

  <!-- 输入区 -->
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="inputBox" rows="1" placeholder="给夸父发消息…" autofocus></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>
  </div>

  <!-- 状态条 -->
  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">就绪</span>
    <span style="flex:1"></span>
    <span id="taskCount"></span>
  </div>
</div>

<script>
'use strict';

const WS_PROTO = location.protocol === 'https:' ? 'wss:' : 'ws:';
const WS_URL = `${WS_PROTO}//${location.host}/ws`;

// ── DOM refs ──
const chatArea = document.getElementById('chatArea');
const welcome = document.getElementById('welcome');
const inputBox = document.getElementById('inputBox');
const sendBtn = document.getElementById('sendBtn');
const modelBadge = document.getElementById('modelBadge');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const taskCount = document.getElementById('taskCount');
const taskList = document.getElementById('taskList');
const taskEmpty = document.getElementById('taskEmpty');
const approvalList = document.getElementById('approvalList');
const approvalEmpty = document.getElementById('approvalEmpty');
const timelineList = document.getElementById('timelineList');
const timelineEmpty = document.getElementById('timelineEmpty');

let isLoading = false;
let ws = null;

// 当前活跃的工具（用于实时计时器）
const activeTools = {};   // { toolName: { startTs, args, timerInterval } }
let timeline = [];         // [{ type, label, ts, elapsed }]
let approvals = {};       // { req_id: { id, title, risk, tool, detail } }

// ── 自动调整 textarea ──
inputBox.addEventListener('input', () => {
  inputBox.style.height = 'auto';
  inputBox.style.height = Math.min(inputBox.scrollHeight, 100) + 'px';
});
inputBox.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.addEventListener('DOMContentLoaded', () => {
  fetchStatus();
  connectWebSocket();
  inputBox.focus();
});

// ═══════════════════════════════════════════════════════════════
// WebSocket 连接
// ═══════════════════════════════════════════════════════════════

function connectWebSocket() {
  if (ws) { ws.close(); }
  ws = new WebSocket(WS_URL);

  ws.onopen = () => { console.log('WS 已连接'); };
  ws.onclose = () => { setTimeout(connectWebSocket, 3000); };
  ws.onmessage = (evt) => {
    try {
      const msg = JSON.parse(evt.data);
      handleWSMessage(msg);
    } catch (_) {}
  };
}

function handleWSMessage(msg) {
  switch (msg.type) {
    case 'llm_start':
      addTimelineItem('llm', '🤔 LLM 思考', msg.ts);
      updateCurrentTask('llm', 'LLM 思考中…', msg.ts);
      setStatus('loading', '思考中…');
      break;
    case 'llm_end':
      updateCurrentTaskDone('llm', msg.ts);
      setStatus('ok', '思考完成');
      break;
    case 'tool_start':
      const label = `${msg.tool}(${shortArgs(msg.args)})`;
      addTimelineItem('tool', `🔧 ${msg.tool}`, msg.ts);
      updateCurrentTask(msg.tool, label, msg.ts);
      setStatus('loading', `执行 ${msg.tool}…`);
      break;
    case 'tool_end':
      updateCurrentTaskDone(msg.tool, msg.ts, msg.elapsed, msg.status);
      setStatus(msg.status === 'error' ? 'error' : 'ok', `${msg.tool} (${msg.elapsed.toFixed(1)}s)`);
      break;
    case 'approval_request':
      addApproval(msg.req_id, msg.tool, msg.args, msg.risk || 'medium');
      setStatus('loading', `⏳ 待审批: ${msg.tool}`);
      break;
    case 'approval_result':
      removeApproval(msg.req_id, msg.approved);
      setStatus('ok', msg.approved ? '已批准' : '已拒绝');
      break;
  }
}

function shortArgs(args) {
  if (!args) return '';
  const s = JSON.stringify(args);
  return s.length > 30 ? s.slice(0, 30) + '…' : s;
}

// ═══════════════════════════════════════════════════════════════
// 实时任务计时器
// ═══════════════════════════════════════════════════════════════

function updateCurrentTask(id, label, startTs) {
  // 结束旧计时器
  if (activeTools[id] && activeTools[id].timerInterval) {
    clearInterval(activeTools[id].timerInterval);
  }
  // 停止所有 llm（保证同时只有一个）
  if (id === 'llm' || id.startsWith('tool_')) {
    // 只终止同类型
  }
  // 移除旧的同 id 项
  const old = document.getElementById(`task-${id}`);
  if (old) old.remove();

  taskEmpty.style.display = 'none';
  const div = document.createElement('div');
  div.id = `task-${id}`;
  div.className = 'task-item';
  div.innerHTML = `
    <span class="task-icon">⏳</span>
    <span class="task-name">${label}</span>
    <span class="task-timer" id="timer-${id}">0.0s</span>
  `;
  taskList.appendChild(div);

  // 启动计时器
  const start = startTs || (Date.now() / 1000);
  const timerEl = document.getElementById(`timer-${id}`);
  const interval = setInterval(() => {
    const elapsed = Date.now() / 1000 - start;
    if (timerEl) timerEl.textContent = `${elapsed.toFixed(1)}s`;
  }, 100);
  activeTools[id] = { startTs: start, timerInterval: interval, el: div };
}

function updateCurrentTaskDone(id, endTs, elapsed, status) {
  const tool = activeTools[id];
  if (!tool) return;

  if (tool.timerInterval) clearInterval(tool.timerInterval);
  const dur = elapsed || (endTs - tool.startTs);
  const el = tool.el;
  if (el) {
    el.className = `task-item ${status === 'error' ? 'error' : 'done'}`;
    el.querySelector('.task-icon').textContent = status === 'error' ? '❌' : '✅';
    el.querySelector('.task-timer').textContent = `${dur.toFixed(1)}s`;
    // 3 秒后淡出
    setTimeout(() => { if (el.parentNode) el.remove(); }, 3000);
  }
  delete activeTools[id];
}

// ═══════════════════════════════════════════════════════════════
// 时间线
// ═══════════════════════════════════════════════════════════════

function addTimelineItem(type, label, ts) {
  timeline.push({ type, label, ts, elapsed: null });
  timelineEmpty.style.display = 'none';
  renderTimeline();
}

function renderTimeline() {
  // 只显示最后 20 条
  const items = timeline.slice(-20);
  timelineList.innerHTML = items.map((item, i) => {
    const dotClass = {
      'llm': 'llm', 'tool': 'tool', 'finish': 'finish', 'error': 'error',
    }[item.type] || 'tool';
    return `<div class="tl-item">
      <span class="tl-dot ${dotClass}"></span>
      <span class="tl-label">${item.label}</span>
      <span class="tl-time">${item.elapsed ? item.elapsed.toFixed(1) + 's' : '…'}</span>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// 审批面板
// ═══════════════════════════════════════════════════════════════

function addApproval(reqId, tool, args, risk) {
  approvals[reqId] = { tool, args, risk };
  approvalEmpty.style.display = 'none';
  renderApprovals();
}

function removeApproval(reqId, approved) {
  delete approvals[reqId];
  renderApprovals();
  if (Object.keys(approvals).length === 0) {
    approvalEmpty.style.display = '';
  }
}

function renderApprovals() {
  const ids = Object.keys(approvals);
  if (ids.length === 0) { approvalEmpty.style.display = ''; approvalList.innerHTML = ''; return; }
  approvalEmpty.style.display = 'none';
  approvalList.innerHTML = ids.map(id => {
    const a = approvals[id];
    const detail = JSON.stringify(a.args || {}, null, 2);
    return `<div class="approval-card" id="appr-${id}">
      <div class="approval-header">
        <span class="approval-tool">🔧 ${a.tool}</span>
        <span class="approval-risk ${a.risk}">${(a.risk || 'medium').toUpperCase()}</span>
      </div>
      <div class="approval-detail">${escapeHtml(detail)}</div>
      <div class="approval-actions">
        <button class="btn-approve" onclick="approveReq('${id}')">✅ 批准</button>
        <button class="btn-reject" onclick="rejectReq('${id}')">⛔ 拒绝</button>
      </div>
    </div>`;
  }).join('');
}

function approveReq(reqId) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'approve', req_id: reqId }));
  } else {
    fetch('/api/approve', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ req_id: reqId })
    });
  }
  removeApproval(reqId, true);
}

function rejectReq(reqId) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'reject', req_id: reqId }));
  } else {
    fetch('/api/reject', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ req_id: reqId })
    });
  }
  removeApproval(reqId, false);
}

// ═══════════════════════════════════════════════════════════════
// 聊天
// ═══════════════════════════════════════════════════════════════

async function sendMessage() {
  const text = inputBox.value.trim();
  if (!text || isLoading) return;

  inputBox.value = '';
  inputBox.style.height = 'auto';
  isLoading = true;
  sendBtn.classList.add('loading');

  welcome.style.display = 'none';
  addMessage('user', text);
  scrollToBottom();

  const loadingId = addLoadingMessage();
  scrollToBottom();
  setStatus('loading', '等待响应…');

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await res.json();

    removeLoadingMessage(loadingId);

    if (data.success) {
      addMessage('assistant', data.message || data.summary || '完成');
      setStatus('ok', `完成 (${data.duration}s)`);
    } else {
      addMessage('error', data.message || '执行失败');
      setStatus('error', '失败');
    }
  } catch (err) {
    removeLoadingMessage(loadingId);
    addMessage('error', '网络错误: ' + err.message);
    setStatus('error', '网络错误');
  }

  isLoading = false;
  sendBtn.classList.remove('loading');
  inputBox.focus();
  scrollToBottom();
}

async function resetChat() {
  if (isLoading) return;
  try { await fetch('/api/reset', { method: 'POST' }); } catch (_) {}

  const msgs = chatArea.querySelectorAll('.message');
  msgs.forEach(m => m.remove());
  welcome.style.display = '';
  setStatus('ok', '新对话');
  // 清空当前任务和审批
  taskList.innerHTML = '';
  taskEmpty.style.display = '';
  approvalList.innerHTML = '';
  approvalEmpty.style.display = '';
  timelineList.innerHTML = '';
  timelineEmpty.style.display = '';
  timeline = [];
  approvals = {};
  inputBox.focus();
}

async function toggleModel() {
  if (isLoading) return;
  const target = prompt('切换模型: local / cloud / deepseek / claude');
  if (!target) return;
  setStatus('loading', '切换模型中…');
  try {
    const res = await fetch('/api/model', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target: target.trim() })
    });
    const data = await res.json();
    setStatus(data.success ? 'ok' : 'error', data.message || (data.success ? '已切换' : '切换失败'));
    if (data.success) fetchStatus();
  } catch (err) { setStatus('error', '网络错误'); }
}

async function fetchStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    if (data.success) {
      modelBadge.textContent = data.model || '—';
      if (data.task_count) taskCount.textContent = `任务: ${data.task_count}`;
    }
  } catch (_) {}
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? '我' : '夸';
  const bubble = document.createElement('div');
  bubble.className = 'msg-content';
  bubble.innerHTML = formatContent(content || '');
  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  bubble.appendChild(time);
  div.appendChild(avatar);
  div.appendChild(bubble);
  chatArea.appendChild(div);
  return div;
}

function addLoadingMessage() {
  const div = document.createElement('div');
  div.className = 'message assistant loading-msg';
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '夸';
  const bubble = document.createElement('div');
  bubble.className = 'msg-content';
  bubble.innerHTML = '<div class="thinking-indicator"><span></span><span></span><span></span></div>';
  div.appendChild(avatar);
  div.appendChild(bubble);
  chatArea.appendChild(div);
  return div;
}

function removeLoadingMessage(id) {
  const el = chatArea.querySelector('.loading-msg');
  if (el) el.remove();
}

function formatContent(text) {
  if (!text) return '';
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      return `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`;
    })
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
  return html;
}

function scrollToBottom() {
  setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 50);
}

function setStatus(type, text) {
  statusText.textContent = text || '就绪';
  statusDot.className = 'status-dot';
  if (type === 'error') statusDot.classList.add('error');
  else if (type === 'loading') statusDot.classList.add('loading');
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

setInterval(fetchStatus, 30000);
</script>
