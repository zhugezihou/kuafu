<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1b1d1e">
<title>夸父 · 手机版</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1b1d1e;--surface:#212529;--surface2:#2d3136;--border:#343a40;--text:#e9ecef;
  --text2:#adb5bd;--accent:#ff8234;--success:#40c057;--error:#fa5252;--info:#4dabf7;
  --radius:10px;--radius-sm:6px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,'PingFang SC',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;font-size:15px;-webkit-tap-highlight-color:transparent}

/* ── 布局 ── */
.app{display:flex;flex-direction:column;height:100dvh}
.header{display:flex;align-items:center;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);gap:8px;flex-shrink:0;z-index:10}
.header .logo{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.header h1{font-size:14px;font-weight:600;flex:1}
.header .model-badge{font-size:10px;color:var(--text2);background:var(--surface2);padding:2px 8px;border-radius:4px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.menu-btn{background:transparent;border:none;color:var(--text2);font-size:18px;padding:4px;cursor:pointer;border-radius:4px;line-height:1}
.menu-btn:hover{color:var(--text)}

/* ── 聊天区 ── */
.chat-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.chat-inner{padding:8px 12px;display:flex;flex-direction:column;gap:0}
.welcome{text-align:center;margin:auto;padding:48px 16px;color:var(--text2)}
.welcome h2{font-size:22px;color:var(--text);margin-bottom:4px;font-weight:600}
.welcome p{font-size:13px;line-height:1.5;max-width:300px;margin:0 auto}

.message{display:flex;gap:10px;padding:12px 0;animation:fadeIn .15s ease}
.message:not(:last-child){border-bottom:1px solid var(--border)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.message.user{flex-direction:row-reverse}
.msg-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:2px}
.message.assistant .msg-avatar{background:var(--accent);color:#fff;font-weight:600}
.message.user .msg-avatar{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.msg-body{flex:1;min-width:0}
.msg-content{font-size:14px;line-height:1.65;word-break:break-word;white-space:pre-wrap;color:var(--text)}
.message.user .msg-content{background:var(--surface2);padding:8px 14px;border-radius:16px;border-bottom-right-radius:4px;color:var(--text);font-size:13px}
.msg-content code{background:var(--surface2);padding:1px 5px;border-radius:4px;font-size:12px;font-family:'SF Mono','Fira Code','Consolas',monospace}
.msg-content pre{background:var(--surface);padding:10px;border-radius:var(--radius-sm);overflow-x:auto;font-size:12px;margin:6px 0;border:1px solid var(--border)}
.msg-content pre code{background:none;padding:0}
.cursor-blink{display:inline-block;width:2px;height:16px;background:var(--accent);margin-left:2px;animation:blink .8s infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── 消息操作按钮 ── */
.msg-actions{display:flex;gap:2px;margin-top:4px;flex-wrap:wrap}
.msg-action-btn{background:transparent;border:none;color:var(--text2);font-size:11px;padding:2px 6px;border-radius:4px;cursor:pointer}
.msg-action-btn:hover{color:var(--text);background:var(--surface2)}

/* ── 输入区 ── */
.input-area{flex-shrink:0;padding:6px 10px calc(6px + var(--safe-bottom));background:var(--surface);border-top:1px solid var(--border)}
.file-list{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.file-chip{display:flex;align-items:center;gap:3px;background:var(--surface2);border-radius:4px;padding:3px 6px;font-size:11px;color:var(--text2)}
.file-chip .remove-file{cursor:pointer;color:var(--error);font-size:12px;margin-left:2px}
.input-row{display:flex;align-items:flex-end;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 2px 2px 14px}
.input-row:focus-within{border-color:var(--accent)}
.input-row textarea{flex:1;background:transparent;border:none;color:var(--text);padding:8px 0;font-size:15px;font-family:inherit;resize:none;min-height:22px;max-height:100px;outline:none;line-height:1.5}
.input-row textarea::placeholder{color:var(--text2)}
.send-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.send-btn.loading{opacity:.4;pointer-events:none}
.send-btn.stop{background:var(--error)}

/* ── 底部栏 ── */
.status-bar{display:flex;align-items:center;gap:6px;padding:4px 12px;font-size:11px;color:var(--text2);background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--success);flex-shrink:0}
.status-dot.loading{background:var(--accent);animation:pulse .6s infinite}
.status-dot.error{background:var(--error)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── 底部导航 ── */
.tab-bar{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:var(--safe-bottom)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px 4px;background:transparent;border:none;color:var(--text2);font-size:10px;cursor:pointer;transition:color .12s}
.tab-btn .tab-icon{font-size:18px;line-height:1}
.tab-btn.active{color:var(--accent)}

/* ── 侧栏面板（抽屉式） ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:none}
.drawer-overlay.open{display:block}
.drawer{position:fixed;bottom:0;left:0;right:0;max-height:70dvh;background:var(--surface);border-radius:16px 16px 0 0;z-index:60;transform:translateY(100%);transition:transform .25s ease;overflow-y:auto}
.drawer.open{transform:translateY(0)}
.drawer-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:8px auto 4px}
.drawer-header{display:flex;align-items:center;padding:8px 16px;border-bottom:1px solid var(--border)}
.drawer-header h3{font-size:14px;font-weight:600;flex:1}
.drawer-close{background:transparent;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:4px}
.drawer-body{padding:8px 16px 24px}
.drawer-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)}
.drawer-item:last-child{border-bottom:none}
.drawer-item .item-icon{font-size:16px;width:20px;text-align:center}
.drawer-item .item-text{flex:1}
.drawer-item .item-meta{font-size:11px;color:var(--text2)}

/* ── 待审批卡片（抽屉内） ── */
.approval-card{border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px;background:var(--surface2)}
.approval-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.approval-tool{font-size:12px;font-weight:500}
.approval-risk{font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(252,196,25,.15);color:var(--warning)}
.approval-risk.high{background:rgba(250,82,82,.15);color:var(--error)}
.approval-detail{font-size:11px;color:var(--text2);margin-bottom:6px;white-space:pre-wrap;max-height:40px;overflow-y:auto}
.approval-actions{display:flex;gap:6px}
.btn-approve,.btn-reject{flex:1;border:none;border-radius:4px;padding:6px;font-size:12px;cursor:pointer}
.btn-approve{background:var(--success);color:#fff}
.btn-reject{background:var(--error);color:#fff}
.panel-empty{font-size:12px;color:var(--text2);text-align:center;padding:12px}

/* ── 时间线（抽屉内） ── */
.tl-item{display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 0;color:var(--text2)}
.tl-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.tl-dot.llm{background:var(--info)}
.tl-dot.tool{background:var(--accent)}
.tl-dot.finish{background:var(--success)}
.tl-dot.error{background:var(--error)}
.tl-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-time{font-size:10px;color:var(--text2);font-variant-numeric:tabular-nums;flex-shrink:0}
.task-timer{font-size:11px;color:var(--warning);font-variant-numeric:tabular-nums}

/* ── 滚动条 ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── 模态框 ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto;padding:20px;margin:20px}
.modal h2{font-size:16px;font-weight:600;margin-bottom:12px}
.modal-close{float:right;background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:3px}
.form-group input,.form-group select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-size:14px;color:var(--text);font-family:inherit;outline:none}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <!-- 顶栏 -->
  <div class="header">
    <button class="menu-btn" id="menuBtn" onclick="toggleDrawer('sessions')">☰</button>
    <div class="logo">夸</div>
    <h1>夸父</h1>
    <span class="model-badge" id="modelBadge">载入中…</span>
  </div>

  <!-- 聊天区 -->
  <div class="chat-area" id="chatArea">
    <div class="chat-inner" id="chatInner">
      <div class="welcome" id="welcome"><h2>夸父</h2><p>逐日不息 · 在指尖</p></div>
    </div>
  </div>

  <!-- 输入区 -->
  <div class="input-area">
    <div class="file-list" id="fileList"></div>
    <div class="input-row">
      <textarea id="inputBox" rows="1" placeholder="给夸父发消息…"></textarea>
      <button class="send-btn" id="sendBtn">→</button>
    </div>
  </div>

  <!-- 状态栏 -->
  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-text" id="statusText">就绪</span>
  </div>

  <!-- 底部导航 -->
  <div class="tab-bar">
    <button class="tab-btn" onclick="showDrawer('tasks')"><span class="tab-icon">⏱</span>任务</button>
    <button class="tab-btn" onclick="showDrawer('approvals')"><span class="tab-icon">🔐</span>审批</button>
    <button class="tab-btn" onclick="showDrawer('timeline')"><span class="tab-icon">📋</span>时间线</button>
    <button class="tab-btn" onclick="toggleModel()"><span class="tab-icon">⚙</span>设置</button>
  </div>
</div>

<!-- 抽屉遮罩 -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- 抽屉面板 -->
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <h3 id="drawerTitle">面板</h3>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<!-- 设置模态框 -->
<div class="modal-overlay hidden" id="settingsModal" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <button class="modal-close" onclick="closeSettings()">✕</button>
    <h2>⚙ 设置</h2>
    <div class="form-group"><label>模型后端</label><select id="settingModel"><option value="cloud">云端 DeepSeek</option><option value="local">本地 Qwen3.5-9B</option></select></div>
    <div class="form-group"><label>系统提示词（可选）</label><input type="text" id="settingSysPrompt" placeholder="例如: 请用英文回答"></div>
    <button class="btn-approve" onclick="saveSettings()" style="padding:8px;width:100%">保存</button>
  </div>
</div>

<script>
'use strict';
const SSE_URL = `${location.protocol==='https:'?'https:':'http:'}//${location.host}/api/events`;

// DOM
const $ = id => document.getElementById(id);
const chatInner = $('chatInner'), welcome = $('welcome'), inputBox = $('inputBox');
const sendBtn = $('sendBtn'), statusDot = $('statusDot'), statusText = $('statusText');
const modelBadge = $('modelBadge'), drawer = $('drawer'), drawerBody = $('drawerBody');
const drawerTitle = $('drawerTitle'), drawerOverlay = $('drawerOverlay');

let isLoading = false, uploadedFiles = [], sysPromptExtra = '';
let approvals = {}, timeline = [], activeTools = {};
let abortController = null;

// 输入事件
inputBox.addEventListener('input', () => { inputBox.style.height='auto'; inputBox.style.height=Math.min(inputBox.scrollHeight,100)+'px'; });
inputBox.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });
document.addEventListener('DOMContentLoaded', ()=>{ fetchStatus(); connectSSE(); inputBox.focus(); });

// ═══ SSE ═══
let eventSource = null;
function connectSSE() {
  if(eventSource) eventSource.close();
  eventSource = new EventSource(SSE_URL);
  eventSource.onmessage = evt => { try{ handleEvent(JSON.parse(evt.data)); }catch(_){} };
  eventSource.onerror = () => { eventSource.close(); setTimeout(connectSSE, 3000); };
}

function handleEvent(msg) {
  switch(msg.type){
    case'llm_start': setStatus('loading','思考…'); break;
    case'llm_end': setStatus('ok','就绪'); break;
    case'tool_start':
      activeTools[msg.tool] = { ts: msg.ts, tool: msg.tool };
      break;
    case'tool_end':
      delete activeTools[msg.tool];
      break;
    case'approval_request':
      approvals[msg.req_id] = { tool: msg.tool, args: msg.args, risk: msg.risk || 'medium' };
      if(drawerTitle.textContent === '🔐 审批') renderDrawer();
      break;
    case'approval_result':
      delete approvals[msg.req_id];
      if(drawerTitle.textContent === '🔐 审批') renderDrawer();
      break;
  }
}

// ═══ 抽屉面板 ═══
let activeDrawer = null;
function toggleDrawer(name) {
  if(activeDrawer === name) { closeDrawer(); return; }
  showDrawer(name);
}
function showDrawer(name) {
  activeDrawer = name;
  drawerOverlay.classList.add('open');
  drawer.classList.add('open');
  switch(name) {
    case'sessions':
      drawerTitle.textContent = '💬 最近对话';
      drawerBody.innerHTML = '<div class="panel-empty">暂无对话记录</div>';
      break;
    case'tasks':
      drawerTitle.textContent = '⏱ 运行中';
      renderDrawer();
      break;
    case'approvals':
      drawerTitle.textContent = '🔐 待审批';
      renderDrawer();
      break;
    case'timeline':
      drawerTitle.textContent = '📋 时间线';
      renderDrawer();
      break;
  }
}
function closeDrawer() {
  activeDrawer = null;
  drawerOverlay.classList.remove('open');
  drawer.classList.remove('open');
}
function renderDrawer() {
  if(!activeDrawer) return;
  switch(activeDrawer) {
    case'tasks': {
      const keys = Object.keys(activeTools);
      if(!keys.length){ drawerBody.innerHTML = '<div class="panel-empty">空闲</div>'; return; }
      drawerBody.innerHTML = keys.map(k => `<div class="drawer-item"><span class="item-icon">⚡</span><span class="item-text">${escHtml(k)}</span><span class="task-timer">…</span></div>`).join('');
      break;
    }
    case'approvals': {
      const ids = Object.keys(approvals);
      if(!ids.length){ drawerBody.innerHTML = '<div class="panel-empty">无待审批</div>'; return; }
      drawerBody.innerHTML = ids.map(id => {
        const a = approvals[id];
        return `<div class="approval-card" id="appr-${id}"><div class="approval-header"><span class="approval-tool">${escHtml(a.tool)}</span><span class="approval-risk ${a.risk}">${(a.risk||'medium').toUpperCase()}</span></div><div class="approval-detail">${escHtml(JSON.stringify(a.args||{},null,2).slice(0,200))}</div><div class="approval-actions"><button class="btn-approve" onclick="approveReq('${id}')">批准</button><button class="btn-reject" onclick="rejectReq('${id}')">拒绝</button></div></div>`;
      }).join('');
      break;
    }
    case'timeline': {
      if(!timeline.length){ drawerBody.innerHTML = '<div class="panel-empty">—</div>'; return; }
      drawerBody.innerHTML = timeline.map(t => {
        const icon = {llm:'💭',tool:'⚡',finish:'✅',error:'❌'}[t.type]||'•';
        return `<div class="tl-item"><span>${icon}</span><span class="tl-label">${escHtml(t.label)}</span><span class="tl-time">${t.time||''}</span></div>`;
      }).join('');
      break;
    }
  }
}

// ═══ 审批操作 ═══
function approveReq(id) {
  fetch('/api/approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({req_id:id})});
  delete approvals[id]; renderDrawer();
}
function rejectReq(id) {
  fetch('/api/reject',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({req_id:id})});
  delete approvals[id]; renderDrawer();
}

// ═══ 聊天 ═══
async function sendMessage() {
  const text = inputBox.value.trim();
  if(!text || isLoading) return;
  isLoading = true;
  sendBtn.textContent = '●'; sendBtn.classList.add('stop');

  // 用户消息
  welcome.style.display = 'none';
  addMessage('user', text);
  inputBox.value = ''; inputBox.style.height = 'auto';

  // AI 消息容器
  const msgDiv = addMessage('assistant', '');
  const contentDiv = msgDiv.querySelector('.msg-content');
  const cursor = document.createElement('span');
  cursor.className = 'cursor-blink';
  contentDiv.appendChild(cursor);

  const reqStart = Date.now();
  setStatus('loading','思考…');

  try {
    const res = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text, system_prompt_extra: sysPromptExtra || undefined})
    });
    const data = await res.json();
    const elapsed = ((Date.now()-reqStart)/1000).toFixed(1);

    // 打字机效果
    const fullText = data.message || data.summary || (data.success ? '完成' : '出错');
    cursor.remove();
    typewriter(contentDiv, fullText, () => {
      // 完成后添加操作按钮
      const actions = document.createElement('div');
      actions.className = 'msg-actions';
      actions.innerHTML = `<button class="msg-action-btn" onclick="navigator.clipboard.writeText(this.parentElement.previousElementSibling.textContent)">📋 复制</button>`;
      msgDiv.querySelector('.msg-body').appendChild(actions);
    });

    setStatus('ok', `${elapsed}s`);
  } catch(e) {
    cursor.remove();
    contentDiv.textContent = `❌ 网络错误: ${e.message}`;
    setStatus('error', '网络错误');
  }

  isLoading = false;
  sendBtn.textContent = '→'; sendBtn.classList.remove('stop');
  chatInner.scrollTop = chatInner.scrollHeight;
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const avatar = role === 'assistant' ? '夸' : '我';
  div.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-body"><div class="msg-content">${escHtml(text)}</div></div>`;
  chatInner.appendChild(div);
  chatInner.scrollTop = chatInner.scrollHeight;
  return div;
}

function typewriter(el, text, cb) {
  let i = 0;
  el.textContent = '';
  function tick() {
    if(i < text.length) {
      el.textContent += text[i];
      i++;
      chatInner.scrollTop = chatInner.scrollHeight;
      const delay = text[i-1] === '\n' ? 20 : text[i-1] === ' ' ? 8 : 20;
      setTimeout(tick, delay);
    } else if(cb) cb();
  }
  tick();
}

// ═══ 设置 ═══
function showSettings() {
  $('settingsModal').classList.remove('hidden');
}
function closeSettings() {
  $('settingsModal').classList.add('hidden');
}
function saveSettings() {
  sysPromptExtra = $('settingSysPrompt').value.trim();
  const target = $('settingModel').value;
  closeSettings();
  if(target) toggleModel(target);
}
function toggleModel(target) {
  const t = target || prompt('切换后端: cloud / local');
  if(!t) return;
  setStatus('loading','切换…');
  fetch('/api/model',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({target:t.trim()})})
    .then(r=>r.json()).then(d=>{
      setStatus(d.success?'ok':'error', d.message||(d.success?'已切换':'失败'));
      if(d.success) fetchStatus();
    }).catch(()=>setStatus('error','网络错误'));
}

// ═══ 状态 ═══
async function fetchStatus() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    if(d.success) {
      modelBadge.textContent = d.model ? d.model.slice(0,16) : '—';
    }
  } catch(_) {}
}
function setStatus(type,text) {
  statusText.textContent = text || '就绪';
  statusDot.className = 'status-dot';
  if(type==='error') statusDot.classList.add('error');
  else if(type==='loading') statusDot.classList.add('loading');
}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

setInterval(fetchStatus, 30000);
</script>
