<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夸父 · AI 助手</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1b1d1e;
  --surface: #212529;
  --surface2: #2d3136;
  --border: #343a40;
  --border-light: #495057;
  --text: #e9ecef;
  --text2: #adb5bd;
  --accent: #ff8234;
  --accent-hover: #ff9a55;
  --success: #40c057;
  --warning: #fcc419;
  --error: #fa5252;
  --info: #4dabf7;
  --radius: 10px;
  --radius-sm: 6px;
  --sidebar: 260px;
  --right-panel: 280px;
}

html, body { height:100%; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,'PingFang SC',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; font-size:14px; }

/* ── Layout ── */
.app { display:flex; height:100vh; }

/* ═══ Sidebar ═══ */
.sidebar { width:var(--sidebar); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-header { padding:14px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); }
.logo { width:30px; height:30px; background:var(--accent); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; color:#fff; }
.sidebar-header h1 { font-size:15px; font-weight:600; }
.sidebar-nav { padding:8px; display:flex; flex-direction:column; gap:2px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:var(--radius-sm); cursor:pointer; color:var(--text2); font-size:13px; transition:all .12s; border:none; background:transparent; width:100%; text-align:left; }
.nav-item:hover { background:var(--surface2); color:var(--text); }
.nav-item.active { background:var(--surface2); color:var(--accent); }
.nav-icon { font-size:15px; width:18px; text-align:center; flex-shrink:0; }

.sidebar-search { margin:8px 12px; position:relative; }
.sidebar-search input { width:100%; background:var(--surface2); border:1px solid transparent; border-radius:var(--radius-sm); padding:7px 12px 7px 30px; font-size:12px; color:var(--text); outline:none; transition:border-color .15s; font-family:inherit; }
.sidebar-search input:focus { border-color:var(--border-light); }
.sidebar-search input::placeholder { color:var(--text2); }
.sidebar-search .search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:12px; color:var(--text2); pointer-events:none; }

.sidebar-section-title { padding:10px 16px 4px; font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.6px; }
.session-list { flex:1; overflow-y:auto; padding:4px 8px; }
.session-item { display:flex; align-items:center; padding:8px 12px; border-radius:var(--radius-sm); cursor:pointer; font-size:12px; color:var(--text2); transition:all .12s; gap:8px; }
.session-item:hover { background:var(--surface2); color:var(--text); }
.session-item .session-title { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.session-item .session-time { font-size:10px; color:var(--text2); opacity:.5; flex-shrink:0; }
.sidebar-footer { padding:10px 16px; border-top:1px solid var(--border); font-size:11px; color:var(--text2); }

/* ═══ Main ═══ */
.main { flex:1; display:flex; flex-direction:column; min-width:0; }
.chat-area { flex:1; overflow-y:auto; }
.chat-inner { max-width:740px; width:100%; margin:0 auto; padding:16px 24px; display:flex; flex-direction:column; gap:0; }

.welcome { text-align:center; margin:auto; padding:48px 20px; color:var(--text2); }
.welcome h2 { font-size:26px; color:var(--text); margin-bottom:6px; font-weight:600; }
.welcome p { font-size:14px; line-height:1.6; max-width:420px; margin:0 auto; }

/* ── Message Stats Bar ── */
.message { display:flex; gap:12px; padding:16px 0; animation:fadeIn .15s ease; border-bottom:1px solid transparent; }
.message:not(:last-child) { border-bottom-color:var(--border); }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.message.user { flex-direction:row-reverse; }

.msg-avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; margin-top:2px; }
.message.assistant .msg-avatar { background:var(--accent); color:#fff; font-weight:600; }
.message.user .msg-avatar { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }

.msg-body { flex:1; min-width:0; display:flex; flex-direction:column; gap:6px; }

.msg-stats-bar { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.msg-stats-bar .model-chip { font-size:10px; padding:1px 6px; border-radius:3px; background:var(--surface2); color:var(--text2); display:flex; align-items:center; gap:3px; }
.msg-stats-bar .stat-chip { font-size:10px; padding:1px 6px; border-radius:3px; background:var(--surface2); color:var(--text2); display:flex; align-items:center; gap:3px; }
.msg-stats-bar .stat-chip.accent { color:var(--accent); }
.msg-stats-bar .stat-chip.green { color:var(--success); }
.msg-stats-bar .progress-bar { flex:1; height:3px; background:var(--surface2); border-radius:2px; overflow:hidden; max-width:120px; }
.msg-stats-bar .progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .3s; }

.msg-content { font-size:14px; line-height:1.7; word-break:break-word; white-space:pre-wrap; color:var(--text); padding:2px 0; }
.message.user .msg-content { background:var(--surface2); padding:10px 16px; border-radius:18px; border-bottom-right-radius:4px; color:var(--text); }

.msg-content code { background:var(--surface2); padding:1px 6px; border-radius:4px; font-size:13px; font-family:'SF Mono','Fira Code','Consolas',monospace; }
.msg-content pre { background:var(--surface); padding:12px; border-radius:var(--radius-sm); overflow-x:auto; font-size:13px; margin:8px 0; border:1px solid var(--border); }
.msg-content pre code { background:none; padding:0; }

.msg-actions { display:flex; gap:2px; opacity:0; transition:opacity .15s; margin-top:4px; }
.message:hover .msg-actions { opacity:1; }
.msg-action-btn { background:transparent; border:none; color:var(--text2); font-size:11px; padding:3px 7px; border-radius:4px; cursor:pointer; transition:all .12s; }
.msg-action-btn:hover { color:var(--text); background:var(--surface2); }

.cursor-blink { display:inline-block; width:2px; height:16px; background:var(--accent); margin-left:2px; animation:blink .8s infinite; vertical-align:middle; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── Input ── */
.input-area { padding:8px 24px 12px; max-width:740px; width:100%; margin:0 auto; }
.input-toolbar { display:flex; gap:4px; padding:4px 4px 6px; }
.toolbar-btn { background:transparent; border:none; color:var(--text2); font-size:12px; padding:4px 8px; border-radius:4px; cursor:pointer; transition:all .12s; display:flex; align-items:center; gap:4px; }
.toolbar-btn:hover { color:var(--text); background:var(--surface2); }
.input-wrapper { display:flex; align-items:flex-end; gap:8px; background:var(--surface2); border:1px solid var(--border); border-radius:18px; padding:4px 4px 4px 16px; transition:border-color .15s; }
.input-wrapper:focus-within { border-color:var(--border-light); }
textarea { flex:1; background:transparent; border:none; color:var(--text); padding:10px 0; font-size:14px; font-family:inherit; resize:none; min-height:24px; max-height:120px; outline:none; line-height:1.5; }
textarea::placeholder { color:var(--text2); }
.send-btn { width:36px; height:36px; border-radius:50%; border:none; background:var(--accent); color:#fff; font-size:15px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .12s; }
.send-btn:hover { background:var(--accent-hover); }
.send-btn.loading { opacity:0.4; pointer-events:none; }
.send-btn.stop { background:var(--error); }

/* ── Bottom Bar ── */
.bottom-bar { display:flex; align-items:center; justify-content:space-between; padding:4px 24px 6px; max-width:740px; width:100%; margin:0 auto; }
.model-selector { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text2); cursor:pointer; padding:4px 8px; border-radius:4px; transition:all .12s; }
.model-selector:hover { color:var(--text); background:var(--surface2); }
.model-selector .dot { width:5px; height:5px; border-radius:50%; background:var(--accent); }
.bar-actions { display:flex; gap:2px; }
.bar-btn { background:transparent; border:none; color:var(--text2); font-size:12px; padding:4px 8px; border-radius:4px; cursor:pointer; transition:all .12s; }
.bar-btn:hover { color:var(--text); background:var(--surface2); }

.bottom-stats { display:flex; align-items:center; gap:12px; padding:4px 24px 8px; max-width:740px; width:100%; margin:0 auto; font-size:11px; color:var(--text2); }
.bottom-stats .stat { color:var(--text2); font-family:'SF Mono','Fira Code','Consolas',monospace; }

.status-bar { display:flex; align-items:center; gap:8px; padding:2px 24px 8px; font-size:11px; color:var(--text2); max-width:740px; width:100%; margin:0 auto; }
.status-dot { width:5px; height:5px; border-radius:50%; background:var(--success); }
.status-dot.loading { background:var(--accent); animation:pulse .6s infinite; }
.status-dot.error { background:var(--error); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.thinking-indicator { display:flex; gap:4px; padding:4px 0; }
.thinking-indicator span { width:5px; height:5px; border-radius:50%; background:var(--accent); animation:bounce 1.4s infinite; }
.thinking-indicator span:nth-child(2) { animation-delay:.2s; }
.thinking-indicator span:nth-child(3) { animation-delay:.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

/* ═══ Right Panel ═══ */
.right-panel { width:var(--right-panel); background:var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; flex-shrink:0; }
.panel-section { padding:14px 16px; border-bottom:1px solid var(--border); }
.panel-title { font-size:10px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.8px; margin-bottom:8px; }

.task-item { display:flex; align-items:center; gap:8px; font-size:12px; padding:5px 0; }
.task-icon { flex-shrink:0; font-size:13px; }
.task-name { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:12px; }
.task-timer { font-family:'SF Mono','Fira Code','Consolas',monospace; font-size:11px; color:var(--warning); min-width:40px; text-align:right; font-variant-numeric:tabular-nums; }
.task-item.done .task-timer { color:var(--success); }
.task-item.error .task-timer { color:var(--error); }

.tl-item { display:flex; align-items:center; gap:8px; font-size:11px; padding:3px 0; color:var(--text2); }
.tl-dot { width:4px; height:4px; border-radius:50%; flex-shrink:0; }
.tl-dot.llm { background:var(--info); }
.tl-dot.tool { background:var(--accent); }
.tl-dot.finish { background:var(--success); }
.tl-dot.error { background:var(--error); }
.tl-label { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tl-time { font-family:'SF Mono','Fira Code','Consolas',monospace; font-size:10px; color:var(--text2); font-variant-numeric:tabular-nums; }

.approval-card { border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px; margin-bottom:8px; background:var(--surface); }
.approval-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.approval-tool { font-size:12px; font-weight:500; }
.approval-risk { font-size:9px; padding:1px 5px; border-radius:3px; background:rgba(252,196,25,.15); color:var(--warning); }
.approval-risk.high { background:rgba(250,82,82,.15); color:var(--error); }
.approval-risk.low { background:rgba(64,192,87,.15); color:var(--success); }
.approval-detail { font-size:10px; color:var(--text2); margin-bottom:6px; white-space:pre-wrap; max-height:50px; overflow-y:auto; }
.approval-actions { display:flex; gap:6px; }
.btn-approve,.btn-reject { flex:1; border:none; border-radius:4px; padding:4px; font-size:10px; cursor:pointer; transition:all .12s; }
.btn-approve { background:var(--success); color:#fff; }
.btn-approve:hover { opacity:.8; }
.btn-reject { background:var(--error); color:#fff; }
.btn-reject:hover { opacity:.8; }

.panel-empty { font-size:11px; color:var(--text2); text-align:center; padding:10px; }

::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--border-light); }

.file-list { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px; }
.file-chip { display:flex; align-items:center; gap:4px; background:var(--surface2); border-radius:4px; padding:4px 8px; font-size:11px; color:var(--text2); }
.file-chip .remove-file { cursor:pointer; color:var(--error); font-size:12px; margin-left:2px; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; z-index:100; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; width:480px; max-height:80vh; overflow-y:auto; padding:20px; }
.modal h2 { font-size:16px; font-weight:600; margin-bottom:16px; }
.modal-close { float:right; background:none; border:none; color:var(--text2); font-size:18px; cursor:pointer; }
.modal-close:hover { color:var(--text); }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:12px; color:var(--text2); margin-bottom:4px; }
.form-group input,.form-group select { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:8px 12px; font-size:13px; color:var(--text); font-family:inherit; outline:none; }
.form-group input:focus,.form-group select:focus { border-color:var(--accent); }
.hidden { display:none !important; }

.session-list .loading-msg { display:flex; align-items:center; gap:6px; padding:8px 12px; font-size:11px; color:var(--text2); }
.session-list .loading-msg .spinner { width:10px; height:10px; border:2px solid var(--text2); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header"><div class="logo">夸</div><h1>夸父</h1></div>
    <div class="sidebar-nav">
      <button class="nav-item active" onclick="switchTab('chat')"><span class="nav-icon">💬</span> 对话</button>
      <button class="nav-item" onclick="switchTab('mcp')"><span class="nav-icon">🔌</span> MCP</button>
      <button class="nav-item" onclick="switchTab('settings')"><span class="nav-icon">⚙</span> 设置</button>
    </div>
    <div class="sidebar-search"><span class="search-icon">⌕</span><input type="text" id="searchInput" placeholder="搜索对话……" oninput="searchSessions(this.value)"></div>
    <div class="sidebar-section-title">最近对话</div>
    <div class="session-list" id="sessionList"><div class="panel-empty" id="sessionEmpty">暂无对话记录</div></div>
    <div class="sidebar-footer" id="modelBadge">载入中…</div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="chat-area" id="chatArea">
      <div class="chat-inner" id="chatInner">
        <div class="welcome" id="welcome"><h2>夸父</h2><p>自我进化的 AI 助手。右侧面板实时显示任务进度和审批。</p></div>
      </div>
    </div>

    <div class="input-area" id="inputArea">
      <div class="file-list" id="fileList"></div>
      <div class="input-toolbar">
        <button class="toolbar-btn" onclick="document.getElementById('fileInput').click()">📎 上传文件</button>
        <button class="toolbar-btn" onclick="showSystemPrompt()">📝 系统提示</button>
        <input type="file" id="fileInput" multiple hidden onchange="handleFiles(this.files)">
      </div>
      <div class="input-wrapper">
        <textarea id="inputBox" rows="1" placeholder="给夸父发消息…" autofocus></textarea>
        <button class="send-btn" id="sendBtn">→</button>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="model-selector" onclick="toggleModel()">
        <span class="dot"></span>
        <span id="modelLabel">夸父</span>
        <span style="font-size:8px;opacity:.5">▼</span>
      </div>
      <div class="bar-actions">
        <button class="bar-btn" onclick="resetChat()">新对话</button>
      </div>
    </div>

    <div class="bottom-stats" id="bottomStats">
      <span class="stat" id="statContext">上下文: —</span>
      <span class="stat" id="statTokens">Tokens: —</span>
      <span class="stat" id="statSpeed">—</span>
    </div>

    <div class="status-bar">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">就绪</span>
      <span style="flex:1"></span>
      <span id="taskCount"></span>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="panel-section">
      <div class="panel-title">⏱ 运行中</div>
      <div id="currentTask"><div class="panel-empty" id="taskEmpty">空闲</div><div id="taskList"></div></div>
    </div>
    <div class="panel-section">
      <div class="panel-title">🔐 待审批</div>
      <div id="approvalPanel"><div class="panel-empty" id="approvalEmpty">无</div><div id="approvalList"></div></div>
    </div>
    <div class="panel-section" style="flex:1">
      <div class="panel-title">📋 时间线</div>
      <div id="timeline"><div class="panel-empty" id="timelineEmpty">—</div><div id="timelineList"></div></div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay hidden" id="settingsModal" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <button class="modal-close" onclick="closeSettings()">✕</button>
    <h2>⚙ 设置</h2>
    <div class="form-group"><label>模型后端</label><select id="settingModel"><option value="local">本地 Qwen3.5-9B</option><option value="cloud">云端 DeepSeek</option></select></div>
    <div class="form-group"><label>最大 Token</label><input type="number" id="settingMaxTokens" value="4096"></div>
    <div class="form-group"><label>温度</label><input type="number" id="settingTemp" value="0.7" min="0" max="2" step="0.1"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="bar-btn" onclick="closeSettings()">取消</button>
      <button class="bar-btn" style="background:var(--accent);color:#fff;padding:6px 16px;border-radius:6px" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<!-- System Prompt Modal -->
<div class="modal-overlay hidden" id="sysPromptModal" onclick="if(event.target===this)closeSysPrompt()">
  <div class="modal">
    <button class="modal-close" onclick="closeSysPrompt()">✕</button>
    <h2>📝 系统提示词</h2>
    <div class="form-group">
      <label>自定义系统提示（可选，将附加到现有 System Prompt 后）</label>
      <textarea id="sysPromptInput" placeholder="输入额外的系统提示……" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;color:var(--text);font-family:inherit;resize:vertical;min-height:80px;outline:none;"></textarea>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="bar-btn" onclick="closeSysPrompt()">取消</button>
      <button class="bar-btn" style="background:var(--accent);color:#fff;padding:6px 16px;border-radius:6px" onclick="saveSysPrompt()">应用</button>
    </div>
  </div>
</div>

<script>
'use strict';
const WS_URL = `${location.protocol==='https:'?'wss:':'ws:'}//${location.host}/ws`;

// DOM
const $ = id => document.getElementById(id);
const chatArea = $('chatArea'), chatInner = $('chatInner'), welcome = $('welcome');
const inputBox = $('inputBox'), sendBtn = $('sendBtn');
const statusDot = $('statusDot'), statusText = $('statusText'), taskCount = $('taskCount');
const taskList = $('taskList'), taskEmpty = $('taskEmpty');
const approvalList = $('approvalList'), approvalEmpty = $('approvalEmpty');
const timelineList = $('timelineList'), timelineEmpty = $('timelineEmpty');
const modelBadge = $('modelBadge'), modelLabel = $('modelLabel');
const sessionList = $('sessionList'), sessionEmpty = $('sessionEmpty');
const fileList = $('fileList');
const statContext = $('statContext'), statTokens = $('statTokens'), statSpeed = $('statSpeed');

let isLoading = false, ws = null, uploadedFiles = [], sysPromptExtra = '';
let activeTools = {}, timeline = [], approvals = {}, lastUsage = null;
let abortController = null;

// Input
inputBox.addEventListener('input', () => { inputBox.style.height='auto'; inputBox.style.height=Math.min(inputBox.scrollHeight,100)+'px'; });
inputBox.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });
document.addEventListener('DOMContentLoaded', ()=>{ fetchStatus();fetchSessions();connectWebSocket();inputBox.focus(); });

// ═══ WebSocket ═══
function connectWebSocket() { if(ws)ws.close(); ws=new WebSocket(WS_URL); ws.onopen=()=>{}; ws.onclose=()=>setTimeout(connectWebSocket,3000); ws.onmessage=evt=>{try{handleWS(JSON.parse(evt.data))}catch(_){}}; }

function handleWS(msg) {
  switch(msg.type){
    case'llm_start': addTimeline('llm','LLM 思考',msg.ts); updateTask('llm','LLM 思考…',msg.ts); setStatus('loading','思考…'); break;
    case'llm_end': finishTask('llm',msg.ts); break;
    case'tool_start': addTimeline('tool',msg.tool,msg.ts); updateTask(msg.tool,`${msg.tool}(${shortArgs(msg.args)})`,msg.ts); setStatus('loading',msg.tool+'…'); break;
    case'tool_end': finishTask(msg.tool,msg.ts,msg.elapsed,msg.status); setStatus(msg.status==='error'?'error':'ok',`${msg.tool}(${msg.elapsed.toFixed(1)}s)`); break;
    case'approval_request': addApproval(msg.req_id,msg.tool,msg.args,msg.risk||'medium'); setStatus('loading',`待审批: ${msg.tool}`); break;
    case'approval_result': removeApproval(msg.req_id,msg.approved); setStatus('ok',msg.approved?'已批准':'已拒绝'); break;
  }
}
function shortArgs(a) { if(!a)return''; const s=JSON.stringify(a); return s.length>24?s.slice(0,24)+'…':s; }

// ═══ Task Timer ═══
function updateTask(id,label,startTs) {
  if(activeTools[id]?.timerInterval) clearInterval(activeTools[id].timerInterval);
  const old=document.getElementById(`task-${id}`); if(old)old.remove();
  taskEmpty.style.display='none';
  const start=startTs||(Date.now()/1000);
  const div=document.createElement('div'); div.id=`task-${id}`; div.className='task-item';
  div.innerHTML=`<span class="task-icon">⏳</span><span class="task-name">${escHtml(label)}</span><span class="task-timer" id="timer-${id}">0.0s</span>`;
  taskList.appendChild(div);
  const interval=setInterval(()=>{const el=document.getElementById(`timer-${id}`);if(el)el.textContent=`${((Date.now()/1000)-start).toFixed(1)}s`;},100);
  activeTools[id]={startTs:start,timerInterval:interval,el:div};
}
function finishTask(id,endTs,elapsed,status) {
  const tool=activeTools[id]; if(!tool)return;
  if(tool.timerInterval)clearInterval(tool.timerInterval);
  const dur=elapsed||(endTs-tool.startTs);
  const el=tool.el; if(el){el.className=`task-item ${status==='error'?'error':'done'}`;el.querySelector('.task-icon').textContent=status==='error'?'✕':'✓';el.querySelector('.task-timer').textContent=`${dur.toFixed(1)}s`;setTimeout(()=>{if(el.parentNode)el.remove();},3000);}
  delete activeTools[id];
}

// ═══ Timeline ═══
function addTimeline(type,label,ts) { timeline.push({type,label,ts,elapsed:null}); timelineEmpty.style.display='none'; renderTimeline(); }
function renderTimeline() {
  const items=timeline.slice(-30);
  timelineList.innerHTML=items.map(i=>{
    const dc={llm:'llm',tool:'tool',finish:'finish',error:'error'}[i.type]||'tool';
    return `<div class="tl-item"><span class="tl-dot ${dc}"></span><span class="tl-label">${escHtml(i.label)}</span><span class="tl-time">${i.elapsed?i.elapsed.toFixed(1)+'s':'…'}</span></div>`;
  }).join('');
}

// ═══ Approval ═══
function addApproval(id,tool,args,risk) { approvals[id]={tool,args,risk}; approvalEmpty.style.display='none'; renderApprovals(); }
function removeApproval(id) { delete approvals[id]; renderApprovals(); if(!Object.keys(approvals).length) approvalEmpty.style.display=''; }
function renderApprovals() {
  const ids=Object.keys(approvals);
  if(!ids.length){approvalEmpty.style.display='';approvalList.innerHTML='';return;}
  approvalEmpty.style.display='none';
  approvalList.innerHTML=ids.map(id=>{
    const a=approvals[id];
    return `<div class="approval-card" id="appr-${id}"><div class="approval-header"><span class="approval-tool">${escHtml(a.tool)}</span><span class="approval-risk ${a.risk}">${(a.risk||'medium').toUpperCase()}</span></div><div class="approval-detail">${escHtml(JSON.stringify(a.args||{},null,2))}</div><div class="approval-actions"><button class="btn-approve" onclick="approveReq('${id}')">批准</button><button class="btn-reject" onclick="rejectReq('${id}')">拒绝</button></div></div>`;
  }).join('');
}
function approveReq(id) { if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({action:'approve',req_id:id})); else fetch('/api/approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({req_id:id})}); removeApproval(id,true); }
function rejectReq(id) { if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({action:'reject',req_id:id})); else fetch('/api/reject',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({req_id:id})}); removeApproval(id,false); }

// ═══ Chat (Typewriter + Stats) ═══
async function sendMessage() {
  const text=inputBox.value.trim();
  if(!text||isLoading) return;
  inputBox.value=''; inputBox.style.height='auto';
  isLoading=true; sendBtn.classList.add('loading');
  welcome.style.display='none';

  // User message
  addMsg('user',text);
  scrollBottom();

  // AI placeholder
  const aiDiv=addMsg('assistant','',true);
  const aiBody=aiDiv.querySelector('.msg-body');
  const statsBar=aiBody.querySelector('.msg-stats-bar');
  const aiText=aiBody.querySelector('.ai-text');
  const cursor=aiBody.querySelector('.cursor-blink');

  // Stats bar: progress + chips
  const progressFill=statsBar.querySelector('.progress-fill');
  const chipDur=statsBar.querySelector('.chip-dur');
  const chipTokens=statsBar.querySelector('.chip-tokens');
  const chipSpeed=statsBar.querySelector('.chip-speed');

  setStatus('loading','等待…');
  const reqStart=Date.now();
  let simProgress=0;

  // Simulate progress
  const progressTimer=setInterval(()=>{
    simProgress=Math.min(simProgress+Math.random()*5,95);
    if(progressFill) progressFill.style.width=simProgress+'%';
    const elapsed=((Date.now()-reqStart)/1000).toFixed(1);
    if(chipDur) chipDur.textContent=elapsed+'s';
  },300);

  try {
    const res=await fetch('/api/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text,system_prompt_extra:sysPromptExtra||undefined})
    });
    const data=await res.json();
    clearInterval(progressTimer);
    const elapsed=((Date.now()-reqStart)/1000).toFixed(1);
    if(progressFill) progressFill.style.width='100%';

    if(data.success) {
      const fullText=data.message||data.summary||'';
      // Stats
      if(chipDur) chipDur.textContent=elapsed+'s';
      if(chipTokens) chipTokens.textContent=Math.ceil(fullText.length/4)+' tok';
      if(chipSpeed) chipSpeed.textContent=(fullText.length/4/parseFloat(elapsed)).toFixed(1)+' t/s';
      if(statsBar) statsBar.style.display='';

      // Usage in bottom bar
      if(data.usage) {
        lastUsage=data.usage;
        statContext.textContent=`上下文: ${data.usage.prompt_tokens||0}/${data.usage.total_tokens||0}`;
        statTokens.textContent=`Tokens: ${data.usage.completion_tokens||0}`;
      } else {
        statContext.textContent=`耗时: ${elapsed}s`;
      }

      // Typewriter
      if(cursor) cursor.style.display='inline-block';
      let idx=0;
      const typeInterval=setInterval(()=>{
        if(idx<fullText.length){
          const chunk=fullText.slice(idx,Math.min(idx+4,fullText.length));
          aiText.textContent+=chunk; idx+=chunk.length; scrollBottom();
        }else{
          clearInterval(typeInterval);
          if(cursor) cursor.style.display='none';
          // Update timeline elapsed
          const lastTl=timeline[timeline.length-1];
          if(lastTl) lastTl.elapsed=parseFloat(elapsed);
          renderTimeline();
        }
      },15);

      setStatus('ok',`完成 (${elapsed}s)`);
    } else {
      aiText.textContent=data.message||'执行失败';
      if(cursor) cursor.style.display='none';
      setStatus('error','失败');
    }
  } catch(err) {
    clearInterval(progressTimer);
    aiText.textContent='网络错误: '+err.message;
    if(cursor) cursor.style.display='none';
    setStatus('error','网络错误');
  }

  isLoading=false; sendBtn.classList.remove('loading');
  inputBox.focus(); scrollBottom();
  fetchSessions();
}

// ═══ Message Render ═══
function addMsg(role,content,isPlaceholder) {
  const div=document.createElement('div'); div.className=`message ${role}`;
  const avatar=document.createElement('div'); avatar.className='msg-avatar'; avatar.textContent=role==='user'?'U':'K';
  const body=document.createElement('div'); body.className='msg-body';

  // Stats bar (assistant only)
  const statsBar=document.createElement('div'); statsBar.className='msg-stats-bar';
  if(role==='assistant'){
    if(isPlaceholder){
      statsBar.innerHTML=`<div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div><span class="stat-chip accent chip-dur">0.0s</span><span class="stat-chip chip-tokens">—</span><span class="stat-chip green chip-speed">—</span>`;
      statsBar.style.display='flex';
    } else {
      statsBar.innerHTML='<span class="model-chip">夸父</span>';
      statsBar.style.display='flex';
    }
  } else {
    statsBar.style.display='none';
  }
  body.appendChild(statsBar);

  // Content
  const contentDiv=document.createElement('div'); contentDiv.className='msg-content';
  if(role==='assistant'&&isPlaceholder){
    const aiText=document.createElement('span'); aiText.className='ai-text';
    const cursor=document.createElement('span'); cursor.className='cursor-blink';
    contentDiv.appendChild(aiText); contentDiv.appendChild(cursor);
  } else {
    contentDiv.innerHTML=fmtContent(content);
  }
  body.appendChild(contentDiv);

  // Actions bar
  const actions=document.createElement('div'); actions.className='msg-actions';
  if(role==='assistant'){
    actions.innerHTML='<button class="msg-action-btn" onclick="copyMsg(this)">复制</button><button class="msg-action-btn" onclick="regenerate(this)">重新生成</button>';
  } else {
    actions.innerHTML='<button class="msg-action-btn" onclick="copyMsg(this)">复制</button>';
  }
  body.appendChild(actions);

  div.appendChild(avatar); div.appendChild(body);
  chatInner.appendChild(div);
  return div;
}

// Message actions
function copyMsg(btn){
  const msg=btn.closest('.message');
  const text=msg.querySelector('.msg-content').textContent;
  navigator.clipboard.writeText(text).catch(()=>{});
}

function regenerate(btn){
  if(isLoading) return;
  const msg=btn.closest('.message');
  const prev=msg.previousElementSibling;
  if(!prev) return;
  const userText=prev.querySelector('.msg-content')?.textContent||'';
  if(userText) { inputBox.value=userText; sendMessage(); }
}

function scrollBottom(){ setTimeout(()=>{chatArea.scrollTop=chatArea.scrollHeight;},50); }

function fmtContent(text){
  if(!text)return'';
  let html=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  html=html.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,code)=>`<pre><code>${escHtml(code.trim())}</code></pre>`);
  html=html.replace(/`([^`]+)`/g,'<code>$1</code>');
  html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  html=html.replace(/\n/g,'<br>');
  return html;
}

// ═══ File Upload ═══
function handleFiles(files){ for(const f of files){if(uploadedFiles.length>=5)break;uploadedFiles.push(f);} renderFiles(); }
function renderFiles(){ fileList.innerHTML=uploadedFiles.map((f,i)=>`<div class="file-chip">📎 ${escHtml(f.name)} <span class="remove-file" onclick="uploadedFiles.splice(${i},1);renderFiles()">✕</span></div>`).join(''); }

// ═══ System Prompt ═══
function showSystemPrompt(){ $('sysPromptModal').classList.remove('hidden'); $('sysPromptInput').value=sysPromptExtra; }
function closeSysPrompt(){ $('sysPromptModal').classList.add('hidden'); }
function saveSysPrompt(){ sysPromptExtra=$('sysPromptInput').value; closeSysPrompt(); setStatus('ok','系统提示已更新'); }

// ═══ Sidebar Nav ═══
function switchTab(tab){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  event.target.closest('.nav-item').classList.add('active');
  if(tab==='settings') openSettings();
  else if(tab==='mcp') openMcp();
}

// ═══ Settings ═══
function openSettings(){ $('settingsModal').classList.remove('hidden'); }
function closeSettings(){ $('settingsModal').classList.add('hidden'); }
function saveSettings(){ closeSettings(); setStatus('ok','已保存'); }

// ═══ MCP ═══
function openMcp(){ alert('夸父内置 MCP Bridge，支持动态发现和调用 MCP Server 工具。\nMCP 配置文件: config/mcp.json'); }

// ═══ Sessions ═══
async function fetchSessions(){
  try{
    const res=await fetch('/api/status'); const data=await res.json();
    if(data.success){
      sessionList.innerHTML=`<div class="session-item"><span class="session-title">当前对话</span><span class="session-time">${(data.model||'夸父').slice(0,12)}</span></div>`;
      sessionEmpty.style.display='none';
    }
  }catch(_){}
}
function searchSessions(q){
  document.querySelectorAll('.session-item').forEach(i=>{
    const t=i.querySelector('.session-title')?.textContent||'';
    i.style.display=t.includes(q)?'':'none';
  });
}

// ═══ Misc ═══
async function resetChat(){
  if(isLoading) return;
  try{await fetch('/api/reset',{method:'POST'});}catch(_){}
  chatInner.querySelectorAll('.message').forEach(m=>m.remove());
  welcome.style.display=''; setStatus('ok','新对话');
  taskList.innerHTML=''; taskEmpty.style.display='';
  approvalList.innerHTML=''; approvalEmpty.style.display='';
  timelineList.innerHTML=''; timelineEmpty.style.display='';
  timeline=[]; approvals=[];
  Object.values(activeTools).forEach(t=>{if(t.timerInterval)clearInterval(t.timerInterval)});
  Object.keys(activeTools).forEach(k=>delete activeTools[k]);
  statContext.textContent='上下文: —'; statTokens.textContent='Tokens: —'; statSpeed.textContent='—';
  inputBox.focus();
}

async function toggleModel(){
  if(isLoading) return;
  const t=prompt('切换: local / cloud'); if(!t) return;
  setStatus('loading','切换…');
  try{
    const r=await fetch('/api/model',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({target:t.trim()})});
    const d=await r.json();
    setStatus(d.success?'ok':'error',d.message||(d.success?'已切换':'失败'));
    if(d.success)fetchStatus();
  }catch(_){setStatus('error','网络错误');}
}

async function fetchStatus(){
  try{
    const r=await fetch('/api/status'); const d=await r.json();
    if(d.success){
      modelBadge.textContent=d.model||'—';
      modelLabel.textContent=d.model?`夸父 · ${d.model.slice(0,22)}`:'夸父';
      if(d.task_count) taskCount.textContent=`任务 ${d.task_count}`;
    }
  }catch(_){}
}

function setStatus(type,text){
  statusText.textContent=text||'就绪';
  statusDot.className='status-dot';
  if(type==='error')statusDot.classList.add('error');
  else if(type==='loading')statusDot.classList.add('loading');
}

function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

setInterval(fetchStatus,30000);
</script>
