name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装基础依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest pytest-cov pytest-timeout

      - name: 全部单元测试（并行覆盖率收集）
        env:
          COVERAGE_FILE: .coverage.ci
        run: |
          python -m pytest \
            tests/test_bulk.py \
            -k "TestEvolutionEngine or TestEvolutionState or TestEvolutionEngineGepaCoverage or TestEvolutionRules" \
            tests/test_approval_denyrules.py \
            tests/test_approval_automode_approval.py \
            tests/test_extra_coverage.py \
            tests/test_safety_path.py \
            tests/test_safety_denial.py \
            tests/test_safety_safetylayer.py \
            tests/test_evolution_tracker_core.py \
            tests/test_evolution_tracker_advanced.py \
            tests/test_evolution_tracker_gap.py \
            tests/test_session_store.py \
            tests/test_llm.py \
            tests/test_context_compress.py \
            tests/test_context_compress_gap.py \
            tests/test_tool_registry_api.py \
            tests/test_tool_registry.py \
            tests/test_tool_registry_pure.py \
            tests/test_aggregate_search.py \
            tests/test_browser.py \
            tests/test_downloader.py \
            tests/test_judge.py \
            tests/test_main.py \
            tests/test_mcp_bridge.py \
            tests/test_subagent.py \
            tests/test_skill_deps.py \
            tests/test_whiteboard.py \
            tests/test_decomposer.py \
            tests/test_executor.py \
            --tb=short -q; echo "TEST_EXIT_CODE=$?"

      - name: Agent Loop 测试（单独跑，避免 timeout 冲突）
        env:
          COVERAGE_FILE: .coverage.ci
        run: |
          coverage run --source=core --parallel-mode -m pytest \
            tests/test_agent_loop_helpers.py \
            tests/test_bulk.py -k "TestAgentLoop" \
            --tb=short -q

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 安装基础依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest pytest-cov pytest-timeout

      - name: 集成测试（端到端）
        env:
          KUAFFU_API_KEY: test-dummy-key
        run: |
          python -m pytest \
            tests/test_all.py \
            tests/test_comprehensive.py \
            tests/test_evolution_pipeline.py \
            tests/test_tool_integration.py \
            --tb=short -q

  coverage-report:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install pyyaml pytest pytest-cov pytest-timeout

      - name: 收集覆盖率（快速验证）
        run: |
          coverage run --source=core -m pytest \
            tests/test_bulk.py \
            -k "TestEvolutionEngine or TestEvolutionState or TestEvolutionEngineGepaCoverage or TestEvolutionRules" \
            tests/test_approval_denyrules.py \
            tests/test_approval_automode_approval.py \
            tests/test_extra_coverage.py \
            tests/test_safety_path.py \
            tests/test_safety_denial.py \
            tests/test_safety_safetylayer.py \
            tests/test_evolution_tracker_core.py \
            tests/test_evolution_tracker_advanced.py \
            tests/test_evolution_tracker_gap.py \
            tests/test_session_store.py \
            tests/test_llm.py \
            tests/test_context_compress.py \
            tests/test_context_compress_gap.py \
            tests/test_tool_registry_api.py \
            tests/test_tool_registry.py \
            tests/test_tool_registry_pure.py \
            tests/test_aggregate_search.py \
            tests/test_browser.py \
            tests/test_downloader.py \
            tests/test_judge.py \
            tests/test_main.py \
            tests/test_mcp_bridge.py \
            tests/test_subagent.py \
            tests/test_skill_deps.py \
            tests/test_whiteboard.py \
            tests/test_decomposer.py \
            tests/test_executor.py \
            tests/test_agent_loop_helpers.py \
            tests/test_bulk.py -k "TestAgentLoop" \
            --tb=short -q && \
          coverage report --include="core/*.py" --sort=Cover

  desktop-build:
    runs-on: windows-latest
    if: always()
    defaults:
      run:
        working-directory: kuafu-desktop

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: kuafu-desktop/package-lock.json

      - name: 安装前端依赖
        run: npm ci

      - name: 前端构建
        run: npm run build

      - name: 准备嵌入式 Python 环境
        shell: powershell
        run: |
          # 下载 Windows 嵌入式 Python
          $url = "https://www.python.org/ftp/python/3.12.9/python-3.12.9-embed-amd64.zip"
          $zip = "$env:RUNNER_TEMP\python.zip"
          $out = "$pwd\src-tauri\python"
          echo "downloading embedded python 3.12.9..."
          curl.exe -L -o $zip $url
          echo "extracting to $out..."
          Expand-Archive -Path $zip -DestinationPath $out -Force

          # 获取系统 Python（用于 pip install pyyaml）
          $sysPython = if (Get-Command "python3" -ErrorAction SilentlyContinue) { "python3" } elseif (Get-Command "python" -ErrorAction SilentlyContinue) { "python" } else { $null }

          # 复制夸父源码
          echo "copying kuafu source..."
          mkdir "$out\kuafu" -Force | Out-Null
          Copy-Item "$pwd\..\core" "$out\kuafu\" -Recurse -Force
          Copy-Item "$pwd\..\pyproject.toml" "$out\kuafu\" -Force

          # 配置 python._pth（启用 import site，使 site-packages 生效）
          Add-Content "$out\python._pth" "`n..\kuafu"
          Add-Content "$out\python._pth" "`nimport site"

          # 预装 pyyaml 到嵌入式 Python（直接下载 yaml 包，避免 pip 在 CI 上出错）
          if ($sysPython) {
            echo "pre-installing pyyaml via $sysPython..."
            # 直接 pip install（忽略 PowerShell 的 NativeCommandError）
            $errorActionPrefSave = $ErrorActionPreference
            $ErrorActionPreference = 'SilentlyContinue'
            $pipResult = & $sysPython -m pip install pyyaml --target "$out\Lib\site-packages" --quiet 2>&1
            $ErrorActionPreference = $errorActionPrefSave
            $pipOk = $LASTEXITCODE -eq 0
            if (-not $pipOk) {
              # 重试：用 get-pip 激活嵌入式 Python 的 pip
              echo "trying ensurepip for embedded python..."
              & "$out\python.exe" -m ensurepip --upgrade --quiet 2>&1 | Out-Null
              & "$out\python.exe" -m pip install pyyaml --quiet 2>&1 | Out-Null
              $check = & "$out\python.exe" -c "import yaml; print('ok')" 2>&1
              $pipOk = $check -eq 'ok'
            }
            if ($pipOk) {
              echo "pyyaml pre-installed"
            } else {
              echo "WARNING: pyyaml pre-install failed"
            }
          } else {
            echo "WARNING: no system python for pre-install, will try ensurepip at runtime"
          }

      - name: Tauri 构建
        shell: powershell
        run: |
          npm run tauri build

      - name: 获取版本号
        shell: powershell
        run: |
          $content = Get-Content src-tauri/Cargo.toml -Raw
          $match = [regex]::Match($content, 'version = "([^"]+)"')
          $ver = $match.Groups[1].Value
          Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$ver"
          Add-Content -Path $env:GITHUB_ENV -Value "TAG_NAME=desktop-v$ver"

      - name: 创建 Release
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $content = Get-Content src-tauri/Cargo.toml -Raw
          $match = [regex]::Match($content, 'version = "([^"]+)"')
          $ver = $match.Groups[1].Value
          gh release create "desktop-v$ver" --title "夸父 Desktop v$ver" --notes "夸父 Desktop 桌面客户端发布" src-tauri/target/release/bundle/nsis/*.exe
