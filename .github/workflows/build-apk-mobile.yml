name: Build Android APK (mobile)

on:
  push:
    branches: [feat/mobile]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kuafu-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Patch: expo-clipboard/expo-file-system missing app.plugin.js (Expo 56 + Node 22 compat)
      - name: Patch missing config plugins
        run: |
          echo 'module.exports = (config) => config;' > node_modules/expo-clipboard/app.plugin.js
          echo 'module.exports = (config) => config;' > node_modules/expo-file-system/app.plugin.js

      - name: Prebuild Android native project
        run: npx expo prebuild --platform android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kuafu-app-debug
          path: kuafu-app/android/app/build/outputs/apk/debug/app-debug.apk
