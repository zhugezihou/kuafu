# ============================================================================
# 夸父 (Kuafu) — Docker Compose 配置
#
# 快速启动（Gateway 模式，自动启用通道）:
#   docker compose up -d
#
# 快速启动（交互模式）:
#   docker compose run --rm kuafu
#
# 查看日志:
#   docker compose logs -f
#
# 停止:
#   docker compose down
#
# 环境变量配置（在 .env 文件中设置）:
#   KUAFFU_BACKEND=cloud|local
#   DEEPSEEK_API_KEY=sk-xxx
#   FEISHU_APP_ID=cli_xxx
#   FEISHU_APP_SECRET=xxx
# ============================================================================

services:
  # ─── 夸父 Agent ──────────────────────────────────────────────────────
  kuafu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kuafu
    image: kuafu:latest
    restart: unless-stopped

    # 默认命令：启动 Gateway（飞书/微信通道）
    # 覆盖为交互模式: docker compose run --rm kuafu
    command: gateway start --host 0.0.0.0 --port 8765

    volumes:
      # 配置文件（必须）
      - ./.env:/app/.env
      # 记忆数据（持久化）
      - ./memory:/app/memory
      # 技能库
      - ./skills:/app/skills

    environment:
      - KUAFFU_BACKEND=${KUAFFU_BACKEND:-cloud}
      - PYTHONUNBUFFERED=1
      # 在 Docker 中标记为容器运行（对某些功能做适配）
      - KUAFFU_DOCKER=1

    # 端口映射（Gateway HTTP API）
    ports:
      - "8765:8765"

    networks:
      - kuafu_net

  # ─── llama-server（可选，本地模式） ──────────────────────────────────
  # 启用方法:
  #   1. 下载模型到 ./models/ 目录
  #   2. docker compose --profile local up -d
  llama-server:
    profiles: ["local"]
    image: ghcr.io/ggml-ai/llama.cpp:full
    container_name: kuafu-llama
    restart: unless-stopped

    volumes:
      - ./models:/models:ro

    # Qwen3.5-9B 推荐参数
    command: >
      --model /models/Qwen3.5-9B-UD-Q4_K_XL.gguf
      --host 0.0.0.0 --port 8080
      -c 8192
      --cache-type-k q8_0
      --cache-type-v q8_0
      -ngl 99

    ports:
      - "8080:8080"

    # GPU 直通（需要 nvidia-container-toolkit）
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    networks:
      - kuafu_net

networks:
  kuafu_net:
    driver: bridge
