# 代码审查子 Agent 配置
name: code-review
description: 对代码进行全面的审查分析，包括安全性、性能、可维护性、代码风格等方面
allowed_tools:
  - read_file
  - search_files
max_turns: 15
output_rules:
  summary_first: true
  format: |
    ## 审查摘要
    - 文件数: {file_count}
    - 问题数: {issue_count}
    - 严重级别: {severity}

    ## 关键发现
    {findings}

    ## 建议
    {recommendations}
