# 文档生成子 Agent 配置
name: doc-generator
description: 根据代码或需求，生成文档、使用说明、API 参考、教程等
allowed_tools:
  - read_file
  - write_file
  - search_files
  - web_search
max_turns: 15
output_rules:
  summary_first: true
  format: |
    ## 文档概要
    - 类型: {doc_type}
    - 文件: {file_path}
    - 字数: {word_count}

    ## 文档内容
    {content}
